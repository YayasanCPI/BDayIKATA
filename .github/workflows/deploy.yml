name: Deploy to GitHub Pages

on:
  # Akan dijalankan otomatis setiap kode di-push ke branch main atau master
  push:
    branches: ["main", "master"]
  # Memungkinkan trigger deploy secara manual dari tab Actions
  workflow_dispatch:

# Konfigurasi permission yang dibutuhkan oleh GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Mencegah deploy ganda berjalan bersamaan
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
